<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d6a7a">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <title>Vincular Idoso - GestCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem">

<div style="width:100%;max-width:420px">
  {% with mensagens = get_flashed_messages(with_categories=true) %}
    {% if mensagens %}
      {% for categoria, msg in mensagens %}
        <div class="alerta alerta-{{ categoria }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="formulario">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:3rem">👵🏻</div>
      <h1 style="font-family:var(--fonte-titulo);font-size:1.6rem;color:var(--cor-primaria-escura);margin-bottom:.25rem">Acessar Ficha do Idoso</h1>
      <p style="color:var(--cor-texto-suave);font-size:.9rem">
        Olá, {{ session.get('usuario_nome') }}! Informe o CPF ou RG do idoso que você acompanha.
      </p>
    </div>

    <form method="POST">
      <div class="form-grupo">
        <label class="form-label" for="cpf_rg">CPF ou RG do idoso</label>
        <input type="text" id="cpf_rg" name="cpf_rg" class="form-input" required autofocus
               placeholder="Digite o CPF ou RG do idoso">
      </div>
      <div class="form-botoes" style="margin-top:1.25rem">
        <button type="submit" class="botao botao-primario" style="width:100%">Acessar ficha</button>
      </div>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.9rem">
      <a href="{{ url_for('logout') }}" style="color:var(--cor-texto-suave)">Sair</a>
    </p>
  </div>
</div>

</body>
</html>
