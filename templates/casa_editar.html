{% extends "base.html" %}
{% block titulo %}Editar Casa{% endblock %}

{% block conteudo %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
  <div>
    <h1 class="titulo-pagina">✏️ Editar Casa</h1>
    <p class="subtitulo">{{ casa.nome }}</p>
  </div>
  <a href="{{ url_for('listar_casas') }}" class="botao botao-secundario">← Voltar</a>
</div>

<div class="secao" style="max-width:560px">
  <form method="POST">
    <div class="form-grupo">
      <label class="form-label" for="nome">Nome da Casa <span style="color:red">*</span></label>
      <input type="text" id="nome" name="nome" class="form-input" required value="{{ casa.nome }}">
    </div>
    <div class="form-botoes" style="margin-top:1.5rem">
      <button type="submit" class="botao botao-primario">Salvar</button>
      <a href="{{ url_for('listar_casas') }}" class="botao botao-secundario">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
