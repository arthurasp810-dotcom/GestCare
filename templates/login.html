{% extends "base.html" %}
{% block titulo %}Login{% endblock %}

{% block conteudo %}
<div style="max-width:400px;margin:2rem auto">
  <div class="formulario">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:3rem">🏡</div>
      <h1 class="titulo-pagina" style="margin-bottom:.25rem">Casa de Idosos</h1>
      <p class="subtitulo" style="margin:0">Entre com suas credenciais</p>
    </div>

    <div class="form-grupo">
      <label class="form-label" for="email">E-mail</label>
      <input type="email" id="email" name="email" class="form-input"
             placeholder="seu@email.com" required autofocus>
    </div>

    <div class="form-grupo">
      <label class="form-label" for="senha">Senha</label>
      <input type="password" id="senha" name="senha" class="form-input"
             placeholder="••••••••" required>
    </div>

    <form method="POST" id="form-login">
      <input type="hidden" name="email" id="email-hidden">
      <input type="hidden" name="senha" id="senha-hidden">
    </form>

    <div class="form-botoes">
      <button type="button" class="botao botao-primario" onclick="submitLogin()">
        Entrar
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function submitLogin() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  document.getElementById('email-hidden').value = email;
  document.getElementById('senha-hidden').value = senha;
  document.getElementById('form-login').submit();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitLogin();
});
</script>
{% endblock %}
